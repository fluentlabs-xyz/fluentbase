reth-provider.workspace = true
reth-revm.workspace = true
reth-transaction-pool.workspace = true
reth-cli.workspace = true
reth-cli-runner.workspace = true
reth-cli-util.workspace = true
reth-consensus-common.workspace = true
reth-rpc-builder.workspace = true
reth-rpc.workspace = true
reth-rpc-convert.workspace = true
reth-rpc-api = { workspace = true, features = ["client"] }
reth-rpc-eth-types.workspace = true
reth-rpc-server-types.workspace = true
reth-network = { workspace = true, features = ["serde"] }
reth-network-api.workspace = true
reth-network-peers.workspace = true
reth-tasks.workspace = true
reth-payload-builder.workspace = true
reth-payload-primitives.workspace = true
reth-node-api.workspace = true
reth-node-core.workspace = true
reth-ethereum-payload-builder.workspace = true
reth-node-ethereum.workspace = true
reth-node-builder.workspace = true
reth-node-metrics.workspace = true
reth-consensus.workspace = true
reth-node-types.workspace = true
reth-storage-api.workspace = true
reth-ethereum.workspace = true
reth-ethereum-consensus.workspace = true
reth-ethereum-engine-primitives.workspace = true
reth-evm.workspace = true
reth-evm-ethereum.workspace = true
reth-consensus-debug-client.workspace = true
reth-engine-primitives.workspace = true
reth-engine-tree.workspace = true
crossbeam-channel.workspace = true
reth-trie-common.workspace = true
reth-basic-payload-builder.workspace = true
reth-chain-state.workspace = true
reth-payload-builder-primitives.workspace = true

# dpos
fluentbase-bls.workspace = true
fluentbase-consensus.workspace = true
fluentbase-staking-reader.workspace = true
fluentbase-p2p.workspace = true
commonware-runtime.workspace = true
commonware-p2p.workspace = true
commonware-consensus.workspace = true
commonware-cryptography = { workspace = true, features = ["std"] }
commonware-utils = { workspace = true, features = ["std"] }
commonware-codec.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true
alloy-sol-types.workspace = true
tokio-util.workspace = true
dashmap.workspace = true
zeroize = { version = "1", default-features = false }
clap = { workspace = true, features = ["derive", "env"] }
futures = "0.3"
serde.workspace = true
hex.workspace = true
jsonrpsee.workspace = true

# fluentbase
fluentbase-runtime = { workspace = true }
fluentbase-revm = { workspace = true }
fluentbase-genesis = { workspace = true }
fluentbase-types = { workspace = true }

# alloy
alloy-primitives = { workspace = true }
#alloy-rpc-types = { workspace = true, features = ["engine"] }
alloy-genesis = { workspace = true }
alloy-evm = { workspace = true }
alloy-consensus = { workspace = true }
alloy-network = { workspace = true }
alloy-rpc-types-engine = { workspace = true }
alloy-rpc-types-eth = { workspace = true }

# async
tokio = { workspace = true, features = ["sync", "macros", "time", "rt-multi-thread"] }

# tracing
tracing.workspace = true

# misc
serde_json = { workspace = true }
eyre = { workspace = true }
directories = { workspace = true }
flate2 = { workspace = true }
reqwest = { workspace = true }

[dev-dependencies]
reth-db-common.workspace = true
reth-provider = { workspace = true, features = ["test-utils"] }

[features]
default = ["std"]
# DEVNET-ONLY: compiles in the unauthenticated commonware-metrics HTTP endpoint
# (`--dpos.metrics-port`) for the smoke regression suite. Off in prod builds.
dpos-devnet-metrics = []
# DEVNET/TEST-ONLY: enables the byzantine beacon-PK_E forge (`--dpos.byzantine`)
# for the byzantine-vrf smoke. Propagates to the consensus crate (the forge lives
# there). Off in prod builds.
dpos-devnet-byzantine = ["fluentbase-consensus/dpos-devnet-byzantine"]
std = [
    "fluentbase-runtime/std",
    "fluentbase-revm/std",
    "fluentbase-genesis/std",
    "fluentbase-types/std",
]
wasmtime = [
    "fluentbase-runtime/wasmtime",
    "fluentbase-revm/wasmtime",
    "fluentbase-genesis/wasmtime",
]
