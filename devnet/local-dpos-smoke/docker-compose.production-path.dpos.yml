# Production-path phase-B override: after the driver has runtime-deployed the
# staking cluster and written /runtime/staking-reader.json (with the runtime
# addresses incl. the now-configurable liveness address), cold-restart the
# validators into `--dpos`. Apply with:
#   docker compose -f docker-compose.production-path.yml \
#     -f docker-compose.production-path.dpos.yml \
#     up -d --force-recreate validator-0 validator-1 validator-2 validator-3 validator-4 validator-5
#
# Committee = validators 0-4 (activeValidatorsLength=5). validator-5 is the
# EXTERNAL joiner. Every validator runs the UNIFIED `--dpos` mode
# (`--dpos.follower-upstream` present): a node whose key is outside the
# committee rides an in-process cert-follow substrate and auto-promotes to
# signer at its first committee epoch boundary (and demotes back on
# rotation-out) — NO restarts, no operator choreography. v5 therefore boots
# the SAME command as everyone and joins by itself once registration +
# delegation land. full-node stays a follower.

# One shared command for validators 1-5: the index arrives via
# `environment: IDX` ($$ = compose-escaped, expanded by the in-container sh)
# and drives the datadir, key paths, and the dialable IP (172.20.0.1$IDX).
# One block to edit instead of five — a hand-edited copy missing one flag is
# exactly the config-asymmetry follower-wedge class this suite exists to catch.
x-dpos-validator-cmd: &dpos-validator-cmd
  entrypoint: ["/bin/sh", "-c"]
  command:
    - |
      exec /usr/local/bin/fluent node \
        --chain=/runtime/genesis-local.json \
        --datadir=/runtime/reth-data/v$$IDX \
        --dpos \
        --dpos.follower-upstream=ws://172.20.0.10:8546 \
        --dpos.bls-key-path=/runtime/keys/validator-$$IDX/bls.hex \
        --dpos.peer-key-path=/runtime/keys/validator-$$IDX/peer.hex \
        --dpos.staking-config=/runtime/staking-reader.json \
        --dpos.bootstrappers=/runtime/peers.json \
        --dpos.dialable=172.20.0.1$$IDX:9000 \
        --dpos.metrics-port=9100 \
        --dpos.slasher-keystore-path=/runtime/keys/validator-$$IDX/slasher.json \
        --dpos.slasher-keystore-password-file=/runtime/keys/validator-$$IDX/slasher.pwd \
        --builder.extradata= \
        --storage.v2=false \
        --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
        --ws --ws.addr=0.0.0.0 --ws.port=8546 \
        --trusted-peers="$(cat /runtime/v0-enode.txt)" \
        --trusted-only \
        --disable-discovery

services:
  # validator-0 keeps its explicit block (WS server + host ports). Its
  # follower-upstream points at validator-1 — pointing a node's follower
  # substrate at ITSELF would be circular (own window serving own follower).
  validator-0:
    command:
      - node
      - --chain=/runtime/genesis-local.json
      - --datadir=/runtime/reth-data/v0
      - --dpos
      - --dpos.follower-upstream=ws://172.20.0.11:8546
      - --dpos.bls-key-path=/runtime/keys/validator-0/bls.hex
      - --dpos.peer-key-path=/runtime/keys/validator-0/peer.hex
      - --dpos.staking-config=/runtime/staking-reader.json
      - --dpos.bootstrappers=/runtime/peers.json
      - --dpos.dialable=172.20.0.10:9000
      - --dpos.metrics-port=9100
      - --dpos.slasher-keystore-path=/runtime/keys/validator-0/slasher.json
      - --dpos.slasher-keystore-password-file=/runtime/keys/validator-0/slasher.pwd
      - --builder.extradata=
      - --storage.v2=false
      - --p2p-secret-key=/runtime/v0-p2p-secret.hex
      - --port=30303
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
    ports:
      - "19100:9100"

  validator-1:
    <<: *dpos-validator-cmd
    environment:
      IDX: "1"

  validator-2:
    <<: *dpos-validator-cmd
    environment:
      IDX: "2"

  validator-3:
    <<: *dpos-validator-cmd
    environment:
      IDX: "3"

  validator-4:
    <<: *dpos-validator-cmd
    environment:
      IDX: "4"

  # External joiner: identical command — the unified supervisor keeps it on
  # the follower substrate (its key is not in committee(0)) and auto-promotes
  # at its first committee epoch boundary after registration + delegation.
  validator-5:
    <<: *dpos-validator-cmd
    environment:
      IDX: "5"

  # Full node as a CERT-FOLLOWER (not the pre-DPoS trust-follow block relay).
  # A trust-follow relay re-executes each block via new_payload, but the beacon
  # boundary block's `commitEpochBeaconKey` system call needs PK_E from the
  # consensus-layer `OrderBlock.beacon_outcome` (a deriver side-channel a relay
  # never populates) — so a relay diverges (skips the commit → wrong state root)
  # at every committee-change boundary. A cert-follower pulls the OrderBlock,
  # runs the deriver (which stages PK_E) and verifies the seed against the
  # in-block/on-chain key — the only follower mode that survives a beacon
  # rotation. (Production implication: followers on a beacon-DPoS chain must
  # cert-follow, or PK_E must be embedded in the executed block.)
  full-node:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --cert-follow \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --builder.extradata= \
          --storage.v2=false \
          --rpc.eth-proof-window=50000 \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/full-node
