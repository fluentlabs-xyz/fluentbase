# Production-path phase-B override: after the driver has runtime-deployed the
# staking cluster and written /runtime/staking-reader.json (with the runtime
# addresses incl. the now-configurable liveness address), cold-restart the
# validators into `--dpos`. Apply with:
#   docker compose -f docker-compose.production-path.yml \
#     -f docker-compose.production-path.dpos.yml \
#     up -d --force-recreate validator-0 validator-1 validator-2 validator-3 validator-4 validator-5
#
# Committee = validators 0-4 (activeValidatorsLength=5). validator-5 is the
# EXTERNAL joiner: it boots in --dpos as a verifier (its key is not yet in the
# committee — build_signer returns None, EpochEngine::new falls through to
# build_verifier) and becomes a signer at the boundary after on-chain
# activateValidator + delegate. full-node stays a follower.

services:
  validator-0:
    command:
      - node
      - --chain=/runtime/genesis-local.json
      - --datadir=/runtime/reth-data/v0
      - --dpos
      - --dpos.bls-key-path=/runtime/keys/validator-0/bls.hex
      - --dpos.peer-key-path=/runtime/keys/validator-0/peer.hex
      - --dpos.staking-config=/runtime/staking-reader.json
      - --dpos.bootstrappers=/runtime/peers.json
      - --dpos.dialable=172.20.0.10:9000
      - --dpos.metrics-port=9100
      - --dpos.slasher-keystore-path=/runtime/keys/validator-0/slasher.json
      - --dpos.slasher-keystore-password-file=/runtime/keys/validator-0/slasher.pwd
      - --builder.extradata=
      - --storage.v2=false
      - --p2p-secret-key=/runtime/v0-p2p-secret.hex
      - --port=30303
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
    ports:
      - "19100:9100"

  validator-1:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --datadir=/runtime/reth-data/v1 \
          --dpos \
          --dpos.bls-key-path=/runtime/keys/validator-1/bls.hex \
          --dpos.peer-key-path=/runtime/keys/validator-1/peer.hex \
          --dpos.staking-config=/runtime/staking-reader.json \
          --dpos.bootstrappers=/runtime/peers.json \
          --dpos.dialable=172.20.0.11:9000 \
          --dpos.metrics-port=9100 \
          --dpos.slasher-keystore-path=/runtime/keys/validator-1/slasher.json \
          --dpos.slasher-keystore-password-file=/runtime/keys/validator-1/slasher.pwd \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery

  validator-2:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --datadir=/runtime/reth-data/v2 \
          --dpos \
          --dpos.bls-key-path=/runtime/keys/validator-2/bls.hex \
          --dpos.peer-key-path=/runtime/keys/validator-2/peer.hex \
          --dpos.staking-config=/runtime/staking-reader.json \
          --dpos.bootstrappers=/runtime/peers.json \
          --dpos.dialable=172.20.0.12:9000 \
          --dpos.metrics-port=9100 \
          --dpos.slasher-keystore-path=/runtime/keys/validator-2/slasher.json \
          --dpos.slasher-keystore-password-file=/runtime/keys/validator-2/slasher.pwd \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery

  validator-3:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --datadir=/runtime/reth-data/v3 \
          --dpos \
          --dpos.bls-key-path=/runtime/keys/validator-3/bls.hex \
          --dpos.peer-key-path=/runtime/keys/validator-3/peer.hex \
          --dpos.staking-config=/runtime/staking-reader.json \
          --dpos.bootstrappers=/runtime/peers.json \
          --dpos.dialable=172.20.0.13:9000 \
          --dpos.metrics-port=9100 \
          --dpos.slasher-keystore-path=/runtime/keys/validator-3/slasher.json \
          --dpos.slasher-keystore-password-file=/runtime/keys/validator-3/slasher.pwd \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery

  validator-4:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --datadir=/runtime/reth-data/v4 \
          --dpos \
          --dpos.bls-key-path=/runtime/keys/validator-4/bls.hex \
          --dpos.peer-key-path=/runtime/keys/validator-4/peer.hex \
          --dpos.staking-config=/runtime/staking-reader.json \
          --dpos.bootstrappers=/runtime/peers.json \
          --dpos.dialable=172.20.0.14:9000 \
          --dpos.metrics-port=9100 \
          --dpos.slasher-keystore-path=/runtime/keys/validator-4/slasher.json \
          --dpos.slasher-keystore-password-file=/runtime/keys/validator-4/slasher.pwd \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery

  # External joiner: boots in --dpos but NOT in the initial committee, so it runs
  # as a verifier until on-chain activateValidator + delegate land its key in
  # getEpochCommittee(E+1), at which boundary it becomes a signer.
  validator-5:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --datadir=/runtime/reth-data/v5 \
          --dpos \
          --dpos.bls-key-path=/runtime/keys/validator-5/bls.hex \
          --dpos.peer-key-path=/runtime/keys/validator-5/peer.hex \
          --dpos.staking-config=/runtime/staking-reader.json \
          --dpos.bootstrappers=/runtime/peers.json \
          --dpos.dialable=172.20.0.15:9000 \
          --dpos.metrics-port=9100 \
          --dpos.slasher-keystore-path=/runtime/keys/validator-5/slasher.json \
          --dpos.slasher-keystore-password-file=/runtime/keys/validator-5/slasher.pwd \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery
