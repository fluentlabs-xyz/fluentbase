# Production-path phase-B override: after the driver has runtime-deployed the
# staking cluster and written /runtime/staking-reader.json (with the runtime
# addresses incl. the now-configurable liveness address), cold-restart the
# validators into `--dpos`. Apply with:
#   docker compose -f docker-compose.production-path.yml \
#     -f docker-compose.production-path.dpos.yml \
#     up -d --force-recreate validator-0 validator-1 validator-2 validator-3 validator-4 validator-5
#
# Committee = validators 0-4 (activeValidatorsLength=5). validator-5 is the
# EXTERNAL joiner: it boots in --dpos as a verifier (its key is not yet in the
# committee — build_signer returns None, EpochEngine::new falls through to
# build_verifier) and becomes a signer at the boundary after on-chain
# activateValidator + delegate. full-node stays a follower.

# One shared --dpos follower-validator command for validators 1-5: the index
# arrives via `environment: IDX` ($$ = compose-escaped, expanded by the
# in-container sh) and drives the datadir, key paths, and the dialable IP
# (172.20.0.1$IDX). One block to edit instead of five.
x-dpos-validator-cmd: &dpos-validator-cmd
  entrypoint: ["/bin/sh", "-c"]
  command:
    - |
      exec /usr/local/bin/fluent node \
        --chain=/runtime/genesis-local.json \
        --datadir=/runtime/reth-data/v$$IDX \
        --dpos \
        --dpos.bls-key-path=/runtime/keys/validator-$$IDX/bls.hex \
        --dpos.peer-key-path=/runtime/keys/validator-$$IDX/peer.hex \
        --dpos.staking-config=/runtime/staking-reader.json \
        --dpos.bootstrappers=/runtime/peers.json \
        --dpos.dialable=172.20.0.1$$IDX:9000 \
        --dpos.metrics-port=9100 \
        --dpos.slasher-keystore-path=/runtime/keys/validator-$$IDX/slasher.json \
        --dpos.slasher-keystore-password-file=/runtime/keys/validator-$$IDX/slasher.pwd \
        --builder.extradata= \
        --storage.v2=false \
        --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
        --trusted-peers="$(cat /runtime/v0-enode.txt)" \
        --trusted-only \
        --disable-discovery

services:
  validator-0:
    command:
      - node
      - --chain=/runtime/genesis-local.json
      - --datadir=/runtime/reth-data/v0
      - --dpos
      - --dpos.bls-key-path=/runtime/keys/validator-0/bls.hex
      - --dpos.peer-key-path=/runtime/keys/validator-0/peer.hex
      - --dpos.staking-config=/runtime/staking-reader.json
      - --dpos.bootstrappers=/runtime/peers.json
      - --dpos.dialable=172.20.0.10:9000
      - --dpos.metrics-port=9100
      - --dpos.slasher-keystore-path=/runtime/keys/validator-0/slasher.json
      - --dpos.slasher-keystore-password-file=/runtime/keys/validator-0/slasher.pwd
      - --builder.extradata=
      - --storage.v2=false
      - --p2p-secret-key=/runtime/v0-p2p-secret.hex
      - --port=30303
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
    ports:
      - "19100:9100"

  validator-1:
    <<: *dpos-validator-cmd
    environment:
      IDX: "1"

  validator-2:
    <<: *dpos-validator-cmd
    environment:
      IDX: "2"

  validator-3:
    <<: *dpos-validator-cmd
    environment:
      IDX: "3"

  validator-4:
    <<: *dpos-validator-cmd
    environment:
      IDX: "4"

  # External joiner: boots in --dpos but NOT in the initial committee, so it runs
  # as a verifier until on-chain activateValidator + delegate land its key in
  # getEpochCommittee(E+1), at which boundary it becomes a signer.
  validator-5:
    <<: *dpos-validator-cmd
    environment:
      IDX: "5"
