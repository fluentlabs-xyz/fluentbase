name: fluent-dpos-smoke

# Pipeline 2 phase-1: validator-0 is a Tempo sequencer producing
# blocks at 1s cadence, validators 1-3 + full-node follow via
# `--sequencer-url ws://172.20.0.10:8546`. Every node passes
# `--dpos.staking-config=/runtime/staking-reader.json` so the
# `commitEpochCommittee` system call runs identically on every
# executor (state-root convergence). Phase-2 (cold-restart to
# `--dpos`) is in `docker-compose.dpos.yml`.
networks:
  fluent-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

x-fluent-build: &fluent-build
  build:
    context: ../..
    dockerfile: devnet/local-dpos-smoke/Dockerfile
  image: fluent-dpos-smoke:local

services:
  genesis-init:
    <<: *fluent-build
    entrypoint: ["/usr/local/bin/genesis-bootstrap"]
    command:
      - --peers=4
      - --bootstrappers=1
      - --output=/runtime
      - --contracts-dir=/contracts
      - --chain-id=2026
      - --validator-ips=172.20.0.10,172.20.0.11,172.20.0.12,172.20.0.13
    volumes:
      - runtime:/runtime
      - ./contracts:/contracts:ro
    networks:
      fluent-net:
        ipv4_address: 172.20.0.5

  validator-0:
    <<: *fluent-build
    depends_on:
      genesis-init:
        condition: service_completed_successfully
    entrypoint: ["/usr/local/bin/fluent"]
    command:
      - node
      - --chain=/runtime/genesis-local.json
      - --validator
      - --validator.block-time=1s
      - --dpos.staking-config=/runtime/staking-reader.json
      - --builder.extradata=
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      # Deterministic enode identity — followers pin this as `--trusted-peers`.
      - --p2p-secret-key=/runtime/v0-p2p-secret.hex
      - --port=30303
      # Persist reth DB on the shared volume so phase-2 cold-restart
      # (`--force-recreate`) doesn't wipe the chain state.
      - --datadir=/runtime/reth-data/v0
    volumes:
      - runtime:/runtime
    ports:
      - "8545:8545"
      - "8546:8546"
    networks:
      fluent-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -s -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://localhost:8545 | grep -q result"
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  validator-1:
    <<: *fluent-build
    depends_on:
      validator-0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --builder.extradata= \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/v1
    volumes:
      - runtime:/runtime
    networks:
      fluent-net:
        ipv4_address: 172.20.0.11

  validator-2:
    <<: *fluent-build
    depends_on:
      validator-0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --builder.extradata= \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/v2
    volumes:
      - runtime:/runtime
    networks:
      fluent-net:
        ipv4_address: 172.20.0.12

  validator-3:
    <<: *fluent-build
    depends_on:
      validator-0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --builder.extradata= \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/v3
    volumes:
      - runtime:/runtime
    networks:
      fluent-net:
        ipv4_address: 172.20.0.13

  full-node:
    <<: *fluent-build
    depends_on:
      validator-0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --builder.extradata= \
          --rpc.eth-proof-window=50000 \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/full-node
    volumes:
      - runtime:/runtime
    ports:
      - "18545:8545"
    networks:
      fluent-net:
        ipv4_address: 172.20.0.20

volumes:
  runtime: {}
