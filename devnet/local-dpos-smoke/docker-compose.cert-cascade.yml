# Cert-follower CASCADE + L1-checkpoint overlay (task dpos_cert_follow_simplify).
#
# Layered on docker-compose.yml + docker-compose.dpos.yml:
#
#   MOCK_ROLLUP_ADDR=0x… docker compose -f docker-compose.yml \
#       -f docker-compose.dpos.yml -f docker-compose.cert-cascade.yml up -d …
#
# `cert-follower-l1`    — tier-1 follower: upstream = validator-0, PLUS the L1
#   Rollup trust-root assert against MockRollup (deployed on the devnet L2
#   itself by the case script; the "L1 RPC" is just v0's RPC — the real read
#   path runs, only the data source is mocked). Serves the `consensus` WS
#   namespace (window-backed) for tier 2.
# `cert-follower-tier2` — tier-2 follower: upstream = TIER 1 (the cascade,
#   D4: followers can serve downstream followers).
# `cert-follower-l1-bogus` — negative: same L1 wiring but the case script has
#   pushed a checkpoint hash that is NOT in the chain — the follower must
#   refuse to start following (fail-closed trust root).

services:
  cert-follower-l1:
    image: fluent-dpos-smoke:local
    depends_on:
      validator-0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --cert-follow \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --cert-follow.l1-rpc-url=http://172.20.0.10:8545 \
          --cert-follow.l1-rollup-address=${MOCK_ROLLUP_ADDR:-0x0000000000000000000000000000000000000000} \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --ws --ws.addr=0.0.0.0 --ws.port=8546 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/cert-follower-l1
    volumes:
      - runtime:/runtime
    ports:
      - "28545:8545"
    networks:
      fluent-net:
        ipv4_address: 172.20.0.24

  cert-follower-tier2:
    image: fluent-dpos-smoke:local
    depends_on:
      cert-follower-l1:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --cert-follow \
          --sequencer-url=ws://172.20.0.24:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/cert-follower-tier2
    volumes:
      - runtime:/runtime
    ports:
      - "48545:8545"
    networks:
      fluent-net:
        ipv4_address: 172.20.0.25

  cert-follower-l1-bogus:
    image: fluent-dpos-smoke:local
    depends_on:
      validator-0:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec /usr/local/bin/fluent node \
          --chain=/runtime/genesis-local.json \
          --cert-follow \
          --sequencer-url=ws://172.20.0.10:8546 \
          --dpos.staking-config=/runtime/staking-reader.json \
          --cert-follow.l1-rpc-url=http://172.20.0.10:8545 \
          --cert-follow.l1-rollup-address=${BOGUS_ROLLUP_ADDR:-0x0000000000000000000000000000000000000000} \
          --builder.extradata= \
          --storage.v2=false \
          --http --http.addr=0.0.0.0 --http.port=8545 --http.api=eth,net,web3 \
          --trusted-peers="$(cat /runtime/v0-enode.txt)" \
          --trusted-only \
          --disable-discovery \
          --datadir=/runtime/reth-data/cert-follower-l1-bogus
    volumes:
      - runtime:/runtime
    ports:
      - "58545:8545"
    networks:
      fluent-net:
        ipv4_address: 172.20.0.26
