name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (verify without publishing)"
        required: false
        default: true
        type: boolean
      confirm_publish:
        description: "Type 'publish' to allow real crates.io publishing"
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-amd64-8core

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract and sanitize version
        id: extract_version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION="${VERSION//\//-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Ensure workflow runs from release tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must be run from a release tag ref (e.g. v1.2.3)."
            exit 1
          fi

      - name: Verify crate version matches tag
        run: |
          tag="${{ steps.extract_version.outputs.version }}"
          tag="${tag#v}"
          cargo_ver=$(grep -m1 '^version' Cargo.toml | awk -F'=' '{print $2}' | tr -d ' "')
          [[ "$tag" == "$cargo_ver"* ]] || {
            echo "Tag $tag doesn't match the Cargo version $cargo_ver"
            exit 1
          }

      - name: Confirm publish gate
        if: ${{ !inputs.dry_run && inputs.confirm_publish != 'publish' }}
        run: |
          echo "Refusing publish: set confirm_publish=publish for non-dry-run execution."
          exit 1

      - name: Publish to crates.io
        if: ${{ !inputs.dry_run && inputs.confirm_publish == 'publish' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p fluentbase-codec-derive
          cargo search fluentbase-codec-derive | head
          cargo publish -p fluentbase-codec
          cargo search fluentbase-codec | head
          cargo publish -p fluentbase-types
          cargo search fluentbase-types | head
          cargo publish -p fluentbase-runtime
          cargo search fluentbase-runtime | head
          cargo publish -p fluentbase-crypto
          cargo search fluentbase-crypto | head
          cargo publish -p fluentbase-sdk-derive-core
          cargo search fluentbase-sdk-derive-core | head
          cargo publish -p fluentbase-sdk-derive
          cargo search fluentbase-sdk-derive | head
          cargo publish -p fluentbase-sdk
          cargo search fluentbase-sdk | head