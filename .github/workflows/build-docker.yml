name: Build Docker Image (Fluentbase)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Custom Docker image tag (e.g., v0.3.7-dev)"
        required: true
      branch:
        description: "Branch to use for SDK build (optional if tag is used)"
        required: false
      push_latest:
        description: "Also tag as latest"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fluentbase-build
  RUST_TOOLCHAIN: 1.93.1

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        shell: bash
        # All ${{ }} values are passed through env and referenced as quoted shell
        # vars. GitHub substitutes ${{ }} as raw text BEFORE the shell runs, so
        # interpolating free-form inputs (docker_tag, branch) or refs (ref_name)
        # directly into run: allows shell injection. env: avoids that.
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GH_SHA: ${{ github.sha }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REF_TYPE: ${{ github.ref_type }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_DOCKER_TAG: ${{ inputs.docker_tag }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          SHA_SHORT=$(echo "${GH_SHA}" | cut -c1-7)
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          EVENT="${GH_EVENT_NAME}"
          REF_TYPE="${GH_REF_TYPE}"
          REF_NAME="${GH_REF_NAME}"

          # --- Determine version and SDK args ---
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
          VERSION="${INPUT_DOCKER_TAG}"
          if [[ -n "${INPUT_BRANCH}" ]]; then
              SDK_VERSION_BRANCH="${INPUT_BRANCH}"
              SDK_VERSION_TAG=""
          else
              SDK_VERSION_BRANCH=""
              SDK_VERSION_TAG="${VERSION}"
          fi
          elif [[ "$REF_TYPE" == "tag" ]]; then
          VERSION="$REF_NAME"
          SDK_VERSION_BRANCH=""
          SDK_VERSION_TAG="${VERSION}"
          else
          VERSION="dev-${SHA_SHORT}"
          SDK_VERSION_BRANCH="${REF_NAME}"
          SDK_VERSION_TAG=""
          fi
          
          IS_RC=false
          if [[ "$VERSION" == *-rc* ]]; then
          IS_RC=true
          fi

          PUSH_LATEST=false
          if [[ "$IS_RC" != "true" ]] && { [[ "$EVENT" == "workflow_dispatch" && "${{ inputs.push_latest }}" == "true" ]] || [[ "$REF_TYPE" == "tag" ]]; }; then
          PUSH_LATEST=true
          fi
          TAGS="${IMAGE}:${VERSION}"
          if [[ ("$EVENT" == "workflow_dispatch" && "${INPUT_PUSH_LATEST}" == "true") || "$REF_TYPE" == "tag" ]]; then
          TAGS+=",${IMAGE}:latest"
          fi
          
          {
          echo "tags=${TAGS}"
          echo "version=${VERSION}"
          echo "sdk_version_branch=${SDK_VERSION_BRANCH}"
          echo "sdk_version_tag=${SDK_VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"
          
          echo "Resolved metadata:"
          echo "  VERSION=${VERSION}"
          echo "  IS_RC=${IS_RC}"
          echo "  PUSH_LATEST=${PUSH_LATEST}"
          echo "  BRANCH=${SDK_VERSION_BRANCH}"
          echo "  TAG=${SDK_VERSION_TAG}"
          echo "  TAGS=${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./docker/Dockerfile.build
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.version=${{ steps.meta.outputs.sdk_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=Fluent Reproducible Build Environment
            org.opencontainers.image.description=Pre-warmed Docker image for reproducible cross-platform builds of Fluent smart contracts
            xyz.fluent.sdk.version=${{ steps.meta.outputs.sdk_version }}
            xyz.fluent.rust.toolchain=${{ env.RUST_TOOLCHAIN }}
          build-args: |
            RUST_TOOLCHAIN=${{ env.RUST_TOOLCHAIN }}
            SDK_VERSION_BRANCH=${{ steps.meta.outputs.sdk_version_branch }}
            SDK_VERSION_TAG=${{ steps.meta.outputs.sdk_version_tag }}
          no-cache: true

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Print summary
        run: |
          echo "### 🚀 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Platform** | \`linux/amd64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Rust** | \`${{ env.RUST_TOOLCHAIN }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **SDK Version** | \`v${{ steps.meta.outputs.sdk_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Available tags:**" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            echo "- \`docker pull ${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
