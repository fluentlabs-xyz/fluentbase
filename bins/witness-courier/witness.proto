syntax = "proto3";

package fluent.witness.v1;

// WitnessService streams block witnesses from the Fluent node to proving
// infrastructure. Sidecars connect, optionally request replay of buffered
// witnesses starting from a given block number, and then receive new
// witnesses in real-time as the node commits blocks.
//
// Transport: gRPC over HTTP/2 (default 127.0.0.1:10000).
// Encoding:  Each WitnessMessage.data field contains a bincode-serialized
//            rsp_client_executor::io::ClientExecutorInput.
service WitnessService {
  // Subscribe opens a server-side stream of witnesses.
  //
  // The node first replays any buffered witnesses with block_number >= from_block
  // (hot ring buffer + cold disk tier), then switches to live delivery.
  //
  // If from_block is 0 the stream starts from the oldest buffered witness.
  // If from_block is beyond the buffer range, only live witnesses are delivered.
  rpc Subscribe(SubscribeRequest) returns (stream WitnessMessage) {}

  // Acknowledge notifies the node that the courier has successfully processed
  // a block witness. The node may delete the cold-tier file for that block.
  rpc Acknowledge(AcknowledgeRequest) returns (AcknowledgeResponse) {}

  // GetWitness retrieves a single block witness from hot buffer or cold tier.
  // Used for key-rotation recovery: the courier re-fetches witnesses for
  // blocks whose signatures became stale after an enclave restart.
  rpc GetWitness(GetWitnessRequest) returns (GetWitnessResponse) {}

  // AcknowledgeRange deletes cold-tier files for blocks in [from_block, to_block].
  // Used for deferred cleanup after a batch is successfully preconfirmed on L1.
  rpc AcknowledgeRange(AcknowledgeRangeRequest) returns (AcknowledgeResponse) {}
}

// SubscribeRequest is sent once when the courier connects.
message SubscribeRequest {
  // First block number the courier wants to receive.
  // Typically set to last_checkpoint + 1 after a restart.
  uint64 from_block = 1;
}

// WitnessMessage carries a single block witness.
message WitnessMessage {
  oneof content {
    // A single block witness.
    WitnessData witness = 1;
  }
}

message WitnessData {
  // L2 block number this witness corresponds to.
  uint64 block_number = 1;

  // Bincode-serialized ClientExecutorInput<FluentPrimitives>.
  // The courier forwards this payload to the proving backend as-is.
  bytes data = 2;
}

message AcknowledgeRequest {
  // Cumulative: the courier confirms it has processed all blocks up to and
  // including this number. The node may delete cold-tier files for all
  // blocks <= up_to_block.
  uint64 up_to_block = 1;
}

message AcknowledgeResponse {}

message GetWitnessRequest {
  uint64 block_number = 1;
}

message GetWitnessResponse {
  // Raw witness payload. Empty if not found.
  bytes data = 1;
  // Whether the witness was found in hot or cold storage.
  bool found = 2;
}

message AcknowledgeRangeRequest {
  uint64 from_block = 1;
  uint64 to_block = 2;
}
