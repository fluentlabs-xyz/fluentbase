commonware-parallel = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.4.0", default-features = false }
commonware-resolver = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.4.0", default-features = false }
num-bigint = { version = "0.4.6", default-features = false, features = [] }
curve25519-dalek = { version = "4.1.3", default-features = false, features = ["alloc"] }
flate2 = "1.1.9"
parking_lot = "0.12"

# dev-dependencies
serde_derive = { version = "1.0", default-features = false }
thiserror = "2.0"
array-bytes = "9.3.0"

[patch."https://github.com/fluentlabs-xyz/fluentbase"]
fluentbase-build = { path = "./crates/build" }
fluentbase-codec = { path = "./crates/codec" }
fluentbase-codec-derive = { path = "./crates/codec-derive" }
fluentbase-contracts = { path = "./crates/contracts" }
fluentbase-crypto = { path = "./crates/crypto" }
fluentbase-evm = { path = "./crates/evm" }
fluentbase-genesis = { path = "./crates/genesis" }
fluentbase-node = { path = "./crates/node" }
fluentbase-revm = { path = "./crates/revm" }
fluentbase-runtime = { path = "./crates/runtime" }
fluentbase-sdk = { path = "./crates/sdk" }
fluentbase-sdk-derive = { path = "./crates/sdk-derive" }
fluentbase-testing = { path = "./crates/testing" }
fluentbase-types = { path = "./crates/types" }

[patch.crates-io]
# reth
reth-codecs = { git = "https://github.com/fluentlabs-xyz/reth-core-rwasm", branch = "v0.3.1-patched" }
reth-primitives-traits = { git = "https://github.com/fluentlabs-xyz/reth-core-rwasm", branch = "v0.3.1-patched" }

# revm
revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-bytecode = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-database = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-state = { package = "revm-state", git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-primitives = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-interpreter = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-inspector = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-context = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-context-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
revm-database-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
#revm-statetest-types = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }
#op-revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v107-patched" }

# tiny-keccak
tiny-keccak = { git = "https://github.com/fluentlabs-xyz/tiny-keccak.git", branch = "rwasm" }

[workspace.lints]
rust.missing_debug_implementations = "warn"
rust.missing_docs = "warn"
rust.rust_2018_idioms = { level = "deny", priority = -1 }
rust.unreachable_pub = "warn"
rust.unused_must_use = "deny"
rustdoc.all = "warn"

[workspace.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[profile.bench]
lto = "fat"
codegen-units = 1

[profile.release]
panic = "unwind"
lto = "thin"
opt-level = 3
strip = "symbols"
debug = "none"
debug-assertions = false
rpath = false
codegen-units = 16

# Speed up compilation time for dev builds by reducing emitted debug info.
# NOTE: Debuggers may provide less useful information with this setting.
# Uncomment this section if you're using a debugger.
[profile.dev]
# https://davidlattimore.github.io/posts/2024/02/04/speeding-up-the-rust-edit-build-run-cycle.html
#debug = "line-tables-only"
#split-debuginfo = "unpacked"

[profile.dev.build-override]
#debug = false
opt-level = 3

# Use the `--profile profiling` flag to show symbols in release mode.
# e.g. `cargo build --profile profiling`
[profile.profiling]
debug = "full"
inherits = "release"
strip = "none"

[profile.ethtests]
inherits = "test"
opt-level = 3

# Speed up tests.
[profile.dev.package]
proptest.opt-level = 3
rand_chacha.opt-level = 3
rand_xorshift.opt-level = 3
unarray.opt-level = 3

# Meant for testing - all optimizations, but with debug assertions and overflow checks.
[profile.hivetests]
inherits = "test"
opt-level = 3
lto = "thin"

[profile.maxperf]
inherits = "release"
lto = "fat"
codegen-units = 1

[profile.reproducible]
inherits = "release"
panic = "abort"
codegen-units = 1
incremental = false

