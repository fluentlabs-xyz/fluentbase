[workspace]
members = [
    "bins/*",
    "crates/build",
    "crates/codec",
    "crates/codec-derive",
    "crates/contracts",
    "crates/crypto",
    "crates/evm",
    "crates/genesis",
    "crates/node",
    "crates/revm",
    "crates/runtime",
    "crates/sdk",
    "crates/sdk-derive",
    "crates/testing",
    "crates/types",
    "crates/dpos/*",
    "devnet/local-dpos-smoke/genesis-bootstrap",
    "e2e",
]
exclude = [
    "crates/svm-common",
    "crates/svm-shared",
    "crates/svm",
    "examples/svm",
    # exclude revm e2e testing suite to let it be a separate crate
    "evm-e2e",
]
resolver = "2"

[workspace.package]
version = "1.3.0-rc.1"
authors = [
    "Dmitry Savonin <dmitry@fluentlabs.xyz>",
]
description = "A framework to build smart contracts on the Fluent L2 as well as blockchains and verifiable compute environments that compile to rWasm"
repository = "https://github.com/fluentlabs-xyz/fluentbase"
edition = "2021"
# If you change it, remember to change in Dockerfile (fluentbase-build)
rust-version = "1.93.1"
readme = "README.md"
license = "MIT"
keywords = ["wasm", "webassembly", "interpreter", "vm"]
categories = ["wasm", "no-std", "virtualization"]

[workspace.dependencies]
# fluentbase
fluentbase-build = { path = "./crates/build", default-features = false, version = "1.3.0-rc.1" }
fluentbase-codec = { path = "./crates/codec", default-features = false, features = ["derive"], version = "1.3.0-rc.1" }
fluentbase-codec-derive = { path = "./crates/codec-derive", default-features = false, version = "1.3.0-rc.1" }
