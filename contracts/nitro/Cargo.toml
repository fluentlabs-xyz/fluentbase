[package]
name = "fluentbase-contracts-nitro"
version = "0.1.0"
edition = "2021"

[dependencies]
fluentbase-sdk = { workspace = true }
coset = { version = "0.4.2", default-features = false }
ciborium = { version = "^0.2.1", default-features = false }
x509-cert = { version = "0.2.5", default-features = false, features = ["pem"] }
der = { version = "=0.7.10", default-features = false, features = ["alloc"] }
p384 = { version = "0.13.0", default-features = false, features = [
    "ecdsa-core",
    "ecdsa",
] }

[dev-dependencies]
fluentbase-testing = { workspace = true }
hex = { workspace = true }

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[features]
default = ["std"]
std = ["fluentbase-sdk/std", "fluentbase-testing/std"]
debug-print = ["fluentbase-sdk/debug-print", "fluentbase-testing/debug-print"]